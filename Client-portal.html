<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adrenalin Coaching — Client Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;1,700;1,800&family=Barlow:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080808;--surface:#111111;--surface2:#181818;--surface3:#202020;--border:#2a2a2a;--accent:#39e600;--accent2:#47c8ff;--text:#f2f2f2;--text2:#888;--text3:#4a4a4a;--green:#39e600;--red:#ff3344;--orange:#ff9900;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  .login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .login-screen.hidden{display:none;}
  .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .login-logo h1{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;font-style:italic;text-transform:uppercase;color:#fff;letter-spacing:2px;}
  .login-logo h1 span{color:#39e600;}
  .login-tagline{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:3px;font-weight:600;font-style:italic;margin-bottom:48px;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:400px;}
  .login-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;font-style:italic;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:24px;}
  .client-select-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.15s;width:100%;text-align:left;margin-bottom:10px;}
  .client-select-btn:hover{border-color:var(--accent);background:rgba(57,230,0,0.06);}
  .client-select-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;font-style:italic;flex-shrink:0;}
  .client-select-name{font-weight:700;font-size:15px;color:var(--text);}
  .client-select-goal{font-size:12px;color:var(--text3);margin-top:2px;}
  .app-screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:80px;}
  .app-screen.active{display:flex;}
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .app-header-logo span{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;font-style:italic;text-transform:uppercase;color:#fff;letter-spacing:1px;}
  .app-header-logo span b{color:var(--accent);}
  .app-header-user{display:flex;align-items:center;gap:8px;}
  .app-header-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;font-style:italic;}
  .app-header-name{font-size:13px;font-weight:600;}
  .logout-btn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:4px 8px;}
  .logout-btn:hover{color:var(--red);}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;}
  .bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;background:none;border:none;color:var(--text3);font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;gap:4px;transition:all 0.15s;}
  .bottom-nav-btn.active{color:var(--accent);}
  .bottom-nav-btn .nav-icon{font-size:20px;}
  .tab-page{display:none;padding:20px;}
  .tab-page.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;font-style:italic;text-transform:uppercase;letter-spacing:1.5px;color:var(--text);margin-bottom:16px;}
  .hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .hero-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
  .hero-stat-value{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;font-style:italic;line-height:1;}
  .hero-stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
  .progress-item{margin-bottom:16px;}
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .progress-label{font-size:13px;font-weight:600;}
  .progress-value{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);}
  .progress-bar{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:4px;}
  .form-group{margin-bottom:14px;}
  label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:6px;}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:all 0.15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(57,230,0,0.15);}
  textarea{resize:vertical;min-height:80px;}
  select option{background:var(--surface2);}
  .btn{padding:12px 20px;border-radius:10px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.5px;width:100%;}
  .btn-primary{background:var(--accent);color:#000;}
  .plan-day{background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .plan-day-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
  .plan-day-title{font-weight:700;font-size:14px;}
  .plan-day-body{padding:0 16px 14px;display:none;}
  .plan-day-body.open{display:block;}
  .exercise-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
  .exercise-row:last-child{border-bottom:none;}
  .exercise-name{font-size:13px;font-weight:600;}
  .exercise-detail{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);}
  .habit-tracker-row{margin-bottom:20px;}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);font-weight:600;margin-bottom:8px;}
  .habit-dots{display:flex;gap:6px;flex-wrap:wrap;}
  .habit-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
  .habit-dot.done{background:var(--green);color:#000;}
  .habit-dot.missed{background:var(--surface3);color:var(--text3);}
  .habit-dot.partial{background:var(--orange);color:#000;}
  .checkin-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
  .coach-note{background:rgba(57,230,0,0.06);border:1px solid rgba(57,230,0,0.15);border-radius:8px;padding:12px;margin-top:10px;font-size:13px;color:var(--text);line-height:1.6;}
  .coach-note-label{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px;}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;}
  .badge-green{background:rgba(57,230,0,0.15);color:var(--green);}
  .badge-blue{background:rgba(71,200,255,0.15);color:var(--accent2);}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#000;font-weight:700;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
  .loading-overlay.hidden{display:none;}
  .loading-pulse{animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text3);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <svg class="loading-pulse" width="50" height="36" viewBox="0 0 50 36" fill="none">
    <polyline points="0,18 10,18 15,5 22,31 29,2 36,23 41,18 50,18" stroke="#39e600" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  </svg>
  <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;font-style:italic;text-transform:uppercase;color:var(--text3);margin-top:16px;letter-spacing:2px">Loading...</div>
</div>

<div class="login-screen" id="loginScreen">
  <div class="login-logo">
    <svg width="42" height="32" viewBox="0 0 42 32" fill="none"><polyline points="0,16 9,16 14,5 20,27 26,2 32,21 37,16 42,16" stroke="#39e600" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/></svg>
    <h1>ADRENALIN <span>COACHING</span></h1>
  </div>
  <div class="login-tagline">Progression Not Perfection</div>
  <div class="login-card">
    <div class="login-title">Who are you?</div>
    <div id="clientSelectGrid"><div class="empty-state"><div class="empty-icon">⏳</div><p>Loading...</p></div></div>
  </div>
</div>

<div class="app-screen" id="appScreen">
  <div class="app-header">
    <div class="app-header-logo">
      <svg width="28" height="20" viewBox="0 0 28 20" fill="none"><polyline points="0,10 6,10 9,3 13,17 17,1 21,13 24,10 28,10" stroke="#39e600" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none"/></svg>
      <span>ADRENALIN <b>COACHING</b></span>
    </div>
    <div class="app-header-user">
      <div class="app-header-avatar" id="headerAvatar"></div>
      <span class="app-header-name" id="headerName"></span>
      <button class="logout-btn" onclick="logout()">← Exit</button>
    </div>
  </div>

  <div class="tab-page active" id="tab-home">
    <div class="hero-stats" id="heroStats"></div>
    <div class="card" id="calorieCard"></div>
    <div class="card" id="todayFocusCard"></div>
    <div class="card" id="latestCoachNoteCard"></div>
  </div>

  <div class="tab-page" id="tab-training">
    <div class="card"><div class="card-title">My Training Plan</div><div id="trainingPlanContent"></div></div>
  </div>

  <div class="tab-page" id="tab-nutrition-plan">
    <div class="card"><div class="card-title">My Nutrition Plan</div><div id="nutritionPlanContent"></div></div>
  </div>

  <div class="tab-page" id="tab-log">
    <div class="card">
      <div class="card-title">💪 Log a Lift</div>
      <div class="form-group"><label>Exercise</label><input type="text" id="log-exercise" placeholder="e.g. Back Squat"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="form-group" style="margin:0"><label>Sets</label><input type="number" id="log-sets" placeholder="4"></div>
        <div class="form-group" style="margin:0"><label>Reps</label><input type="number" id="log-reps" placeholder="8"></div>
        <div class="form-group" style="margin:0"><label>kg</label><input type="number" id="log-weight" placeholder="80"></div>
      </div>
      <div class="form-group"><label>Date</label><input type="date" id="log-lift-date"></div>
      <div class="form-group"><label>Notes</label><input type="text" id="log-notes" placeholder="How did it feel?"></div>
      <button class="btn btn-primary" onclick="logLift()">Log Lift</button>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="card-title">🥗 Log Nutrition</div>
      <div class="form-group"><label>Date</label><input type="date" id="log-nutr-date"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="form-group" style="margin:0"><label>Calories</label><input type="number" id="log-cals" placeholder="2000"></div>
        <div class="form-group" style="margin:0"><label>Protein (g)</label><input type="number" id="log-protein" placeholder="160"></div>
      </div>
      <div class="form-group"><label>Meal Quality</label><select id="log-quality"><option value="excellent">Excellent 🟢</option><option value="good">Good 🟡</option><option value="average" selected>Average 🟠</option><option value="poor">Poor 🔴</option></select></div>
      <button class="btn btn-primary" onclick="logNutrition()">Log Nutrition</button>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="card-title">✅ Daily Habits</div>
      <div class="form-group"><label>Date</label><input type="date" id="log-habit-date"></div>
      <div class="form-group"><label>Training</label><select id="log-training"><option value="done">✅ Completed</option><option value="partial">⚡ Partial</option><option value="missed">❌ Missed</option></select></div>
      <div class="form-group"><label>Nutrition on track?</label><select id="log-nutrition-habit"><option value="done">✅ Yes</option><option value="partial">⚡ Mostly</option><option value="missed">❌ Off track</option></select></div>
      <div class="form-group"><label>Water</label><select id="log-water"><option value="done">✅ 2L+</option><option value="partial">⚡ 1-2L</option><option value="missed">❌ Under 1L</option></select></div>
      <div class="form-group"><label>Sleep (hours)</label><input type="number" id="log-sleep" placeholder="7.5" step="0.5"></div>
      <button class="btn btn-primary" onclick="logHabits()">Log Habits</button>
    </div>
  </div>

  <div class="tab-page" id="tab-checkin">
    <div class="card">
      <div class="card-title">📝 Weekly Check-in</div>
      <div class="form-group"><label>Date</label><input type="date" id="ci-date"></div>
      <div class="form-group"><label>Weight (kg)</label><input type="number" id="ci-weight" placeholder="80.5" step="0.1"></div>
      <div class="form-group"><label>Energy (1-10)</label><input type="number" id="ci-energy" placeholder="7" min="1" max="10"></div>
      <div class="form-group"><label>Stress (1-10)</label><input type="number" id="ci-stress" placeholder="4" min="1" max="10"></div>
      <div class="form-group"><label>Mood (1-10)</label><input type="number" id="ci-mood" placeholder="8" min="1" max="10"></div>
      <div class="form-group"><label>How has your week been?</label><textarea id="ci-notes" placeholder="Share wins, struggles, how you're feeling..."></textarea></div>
      <button class="btn btn-primary" onclick="submitCheckin()">Submit Check-in</button>
    </div>
    <div class="card" style="margin-top:16px"><div class="card-title">Check-in History</div><div id="checkinHistoryDisplay"></div></div>
    <div class="card" style="margin-top:16px"><div class="card-title">Habit Tracker</div><div id="habitTrackerDisplay"></div></div>
  </div>

  <nav class="bottom-nav">
    <button class="bottom-nav-btn active" onclick="switchTab('home',this)"><span class="nav-icon">🏠</span>Home</button>
    <button class="bottom-nav-btn" onclick="switchTab('training',this)"><span class="nav-icon">📋</span>Training</button>
    <button class="bottom-nav-btn" onclick="switchTab('nutrition-plan',this)"><span class="nav-icon">🥑</span>Nutrition</button>
    <button class="bottom-nav-btn" onclick="switchTab('log',this)"><span class="nav-icon">➕</span>Log</button>
    <button class="bottom-nav-btn" onclick="switchTab('checkin',this)"><span class="nav-icon">📝</span>Check-in</button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-jwjiIhXTaG1-KV-Pilu9hYoZit1rzvc",
  authDomain: "adrenalin-coaching.firebaseapp.com",
  projectId: "adrenalin-coaching",
  storageBucket: "adrenalin-coaching.firebasestorage.app",
  messagingSenderId: "1054985201035",
  appId: "1:1054985201035:web:86593b78bb887f6b127b8e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let clients = [];
let currentClient = null;

onSnapshot(collection(db, 'clients'), snapshot => {
  clients = [];
  snapshot.forEach(d => clients.push({ id: d.id, ...d.data() }));
  clients.sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||''));
  document.getElementById('loadingOverlay').classList.add('hidden');
  renderLoginList();
  if (currentClient) {
    currentClient = clients.find(c => c.id === currentClient.id) || currentClient;
    renderAll();
  }
});

function renderLoginList() {
  const grid = document.getElementById('clientSelectGrid');
  if (!clients.length) { grid.innerHTML='<div class="empty-state"><div class="empty-icon">😕</div><p>No clients set up yet.<br>Ask your coach to add you!</p></div>'; return; }
  grid.innerHTML = clients.map(c=>`<button class="client-select-btn" onclick="login('${c.id}')"><div class="client-select-avatar" style="background:${c.color}20;color:${c.color}">${ini(c)}</div><div><div class="client-select-name">${c.fname} ${c.lname}</div><div class="client-select-goal">${c.goal}</div></div></button>`).join('');
}

window.login = function(id) {
  currentClient = clients.find(c => c.id === id); if (!currentClient) return;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.add('active');
  const av = document.getElementById('headerAvatar');
  av.textContent = ini(currentClient); av.style.background = currentClient.color+'20'; av.style.color = currentClient.color;
  document.getElementById('headerName').textContent = currentClient.fname;
  renderAll(); setDefaultDates();
}

window.logout = function() {
  currentClient = null;
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.remove('hidden');
}

function renderAll() { renderHome(); renderTrainingPlan(); renderNutritionPlan(); renderCheckinHistory(); renderHabitTracker(); }

function renderHome() {
  const c = currentClient; if (!c) return;
  const sessions = (c.lifts||[]).length + (c.cardio||[]).length;
  const lastCI = [...(c.checkins||[])].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const totalH = (c.habits||[]).length;
  const doneH = (c.habits||[]).filter(h=>h.training==='done').length;
  const compliance = totalH ? Math.round((doneH/totalH)*100) : 0;
  document.getElementById('heroStats').innerHTML=`
    <div class="hero-stat"><div class="hero-stat-value" style="color:var(--accent)">${sessions}</div><div class="hero-stat-label">Sessions</div></div>
    <div class="hero-stat"><div class="hero-stat-value" style="color:var(--accent2)">${lastCI?.weight||'--'}</div><div class="hero-stat-label">Last Weight kg</div></div>
    <div class="hero-stat"><div class="hero-stat-value" style="color:var(--orange)">${compliance}%</div><div class="hero-stat-label">Compliance</div></div>
    <div class="hero-stat"><div class="hero-stat-value" style="color:var(--green)">${(c.checkins||[]).length}</div><div class="hero-stat-label">Check-ins</div></div>`;
  const todayN = [...(c.nutrition||[])].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const ct = parseInt(c.calsTarget)||0; const pt = parseInt(c.proteinTarget)||0;
  document.getElementById('calorieCard').innerHTML = ct ? `<div class="card-title">Today's Nutrition</div><div class="progress-item"><div class="progress-header"><span class="progress-label">Calories</span><span class="progress-value">${todayN?.cals||0} / ${ct} kcal</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,((todayN?.cals||0)/ct)*100)}%;background:var(--accent)"></div></div></div><div class="progress-item"><div class="progress-header"><span class="progress-label">Protein</span><span class="progress-value">${todayN?.protein||0}g / ${pt}g</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,pt?((todayN?.protein||0)/pt)*100:0)}%;background:var(--accent2)"></div></div></div>` : '';
  const plan = c.trainingPlan; const d0 = plan?.days?.[0];
  document.getElementById('todayFocusCard').innerHTML = d0 ? `<div class="card-title">Training Focus</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">${d0.label||'Day 1'}</div><span class="badge badge-green">${d0.type}</span>${d0.notes?`<div style="font-size:13px;color:var(--text3);margin-top:8px">${d0.notes}</div>`:''} ${(d0.exercises||[]).length?`<div style="margin-top:12px">${(d0.exercises||[]).slice(0,3).map(e=>`<div style="font-size:13px;color:var(--text3);padding:3px 0">• ${e.name}${e.sets?' — '+e.sets+'×'+e.reps:''}</div>`).join('')}</div>`:''}` : '';
  document.getElementById('latestCoachNoteCard').innerHTML = lastCI?.notes ? `<div class="card-title">Latest Coach Note</div><div class="coach-note"><div class="coach-note-label">📋 Coach</div>${lastCI.notes}</div><div style="font-size:11px;color:var(--text3);margin-top:8px">${fmtDate(lastCI.date)}</div>` : '';
}

function renderTrainingPlan() {
  const c = currentClient; if (!c) return;
  const el = document.getElementById('trainingPlanContent'); const plan = c.trainingPlan;
  if (!plan||!plan.days?.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p>Your coach hasn\'t set a training plan yet.</p></div>'; return; }
  el.innerHTML=`${plan.name?`<div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;font-style:italic;color:var(--accent);margin-bottom:8px">${plan.name}</div>`:''} ${plan.notes?`<div style="font-size:13px;color:var(--text3);margin-bottom:16px;line-height:1.6">${plan.notes}</div>`:''}${(plan.days||[]).map((day,i)=>`<div class="plan-day"><div class="plan-day-header" onclick="toggleDay(${i})"><div><div class="plan-day-title">${day.label||'Day '+(i+1)}</div>${day.notes?`<div style="font-size:12px;color:var(--text3);margin-top:2px">${day.notes}</div>`:''}</div><div style="display:flex;align-items:center;gap:8px"><span class="badge ${day.type==='rest'?'badge-blue':'badge-green'}">${day.type}</span><span style="color:var(--text3)" id="arr${i}">▼</span></div></div><div class="plan-day-body" id="daybody${i}">${(day.exercises||[]).length?day.exercises.map(e=>`<div class="exercise-row"><span class="exercise-name">${e.name}</span><span class="exercise-detail">${e.sets}×${e.reps}${e.weight?' @ '+e.weight+'kg':''}</span></div>`).join(''):'<div style="font-size:13px;color:var(--text3);padding:8px 0">Rest or recovery day</div>'}</div></div>`).join('')}`;
}

window.toggleDay = function(i) {
  const el=document.getElementById('daybody'+i); el.classList.toggle('open');
  document.getElementById('arr'+i).textContent=el.classList.contains('open')?'▲':'▼';
}

function renderNutritionPlan() {
  const c = currentClient; if (!c) return;
  const el = document.getElementById('nutritionPlanContent'); const plan = c.nutritionPlan;
  if (!plan||!plan.meals?.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">🥑</div><p>Your coach hasn\'t set a nutrition plan yet.</p></div>'; return; }
  const totalCals=(plan.meals||[]).reduce((s,m)=>s+parseInt(m.calories||0),0);
  el.innerHTML=`${plan.name?`<div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;font-style:italic;color:var(--accent);margin-bottom:8px">${plan.name}</div>`:''} ${plan.notes?`<div style="font-size:13px;color:var(--text3);margin-bottom:16px;line-height:1.6">${plan.notes}</div>`:''} ${totalCals?`<div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:16px;text-align:center"><div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;font-style:italic;color:var(--accent)">${totalCals} kcal</div><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Daily Target</div></div>`:''} ${(plan.meals||[]).map(m=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:700;font-size:14px">${m.label||'Meal'}</div>${m.calories?`<span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent)">${m.calories} kcal</span>`:''}</div>${m.notes?`<div style="font-size:12px;color:var(--text3);margin-bottom:8px">${m.notes}</div>`:''} ${(m.foods||[]).map(f=>`<div style="font-size:13px;color:var(--text);padding:3px 0;border-bottom:1px solid var(--border)">• ${f.name}${f.amount?' — <span style="color:var(--text3)">'+f.amount+'</span>':''}</div>`).join('')}</div>`).join('')}`;
}

window.logLift = async function() {
  const c=currentClient; if(!c)return;
  const exercise=gv('log-exercise').trim(); const sets=parseInt(gv('log-sets')); const reps=parseInt(gv('log-reps'));
  if(!exercise||!sets||!reps){showToast('Please fill in exercise, sets and reps');return;}
  c.lifts=c.lifts||[]; c.lifts.push({exercise,sets,reps,weight:parseFloat(gv('log-weight'))||0,date:gv('log-lift-date'),notes:gv('log-notes')});
  await setDoc(doc(db,'clients',c.id),c);
  ['log-exercise','log-sets','log-reps','log-weight','log-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  showToast('✅ Lift logged!'); renderHome();
}

window.logNutrition = async function() {
  const c=currentClient; if(!c)return;
  const cals=parseInt(gv('log-cals')); if(!cals){showToast('Please enter calories');return;}
  c.nutrition=c.nutrition||[]; c.nutrition.push({date:gv('log-nutr-date'),cals,protein:parseInt(gv('log-protein'))||0,carbs:0,fats:0,quality:gv('log-quality'),notes:''});
  await setDoc(doc(db,'clients',c.id),c);
  ['log-cals','log-protein'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  showToast('✅ Nutrition logged!'); renderHome();
}

window.logHabits = async function() {
  const c=currentClient; if(!c)return;
  c.habits=c.habits||[]; c.habits.push({date:gv('log-habit-date'),training:gv('log-training'),nutrition:gv('log-nutrition-habit'),water:gv('log-water'),sleep:parseFloat(gv('log-sleep'))||0});
  await setDoc(doc(db,'clients',c.id),c);
  document.getElementById('log-sleep').value='';
  showToast('✅ Habits logged!'); renderHome(); renderHabitTracker();
}

window.submitCheckin = async function() {
  const c=currentClient; if(!c)return;
  c.checkins=c.checkins||[]; c.checkins.push({date:gv('ci-date'),weight:parseFloat(gv('ci-weight'))||null,energy:parseInt(gv('ci-energy'))||null,stress:parseInt(gv('ci-stress'))||null,mood:parseInt(gv('ci-mood'))||null,notes:gv('ci-notes')});
  await setDoc(doc(db,'clients',c.id),c);
  ['ci-weight','ci-energy','ci-stress','ci-mood','ci-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  showToast('✅ Check-in submitted!'); renderHome(); renderCheckinHistory();
}

function renderCheckinHistory() {
  const c=currentClient; if(!c)return;
  const el=document.getElementById('checkinHistoryDisplay');
  const checkins=[...(c.checkins||[])].sort((a,b)=>b.date.localeCompare(a.date));
  if(!checkins.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📝</div><p>No check-ins yet</p></div>';return;}
  el.innerHTML=checkins.map(ci=>`<div class="checkin-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px">${fmtDate(ci.date)}</span>${ci.weight?`<span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent)">${ci.weight} kg</span>`:''}</div><div style="display:flex;gap:16px;flex-wrap:wrap">${ci.energy?`<div style="text-align:center"><div style="font-size:11px;color:var(--text3)">Energy</div><div style="font-weight:700;color:var(--accent2)">${ci.energy}/10</div></div>`:''} ${ci.stress?`<div style="text-align:center"><div style="font-size:11px;color:var(--text3)">Stress</div><div style="font-weight:700;color:var(--red)">${ci.stress}/10</div></div>`:''} ${ci.mood?`<div style="text-align:center"><div style="font-size:11px;color:var(--text3)">Mood</div><div style="font-weight:700;color:var(--green)">${ci.mood}/10</div></div>`:''}</div>${ci.notes?`<div style="font-size:13px;color:var(--text3);margin-top:8px;line-height:1.6">${ci.notes}</div>`:''}</div>`).join('');
}

function renderHabitTracker() {
  const c=currentClient; if(!c)return;
  const el=document.getElementById('habitTrackerDisplay');
  const habits=[...(c.habits||[])].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  if(!habits.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><p>No habits logged yet</p></div>';return;}
  el.innerHTML=`<div class="habit-tracker-row"><div class="section-label">Training</div><div class="habit-dots">${habits.map(h=>`<div class="habit-dot ${h.training}" title="${h.date}">${h.date.slice(5)}</div>`).join('')}</div></div><div class="habit-tracker-row"><div class="section-label">Nutrition</div><div class="habit-dots">${habits.map(h=>`<div class="habit-dot ${h.nutrition}" title="${h.date}">${h.date.slice(5)}</div>`).join('')}</div></div><div class="habit-tracker-row"><div class="section-label">Water</div><div class="habit-dots">${habits.map(h=>`<div class="habit-dot ${h.water}" title="${h.date}">${h.date.slice(5)}</div>`).join('')}</div></div>`;
}

window.switchTab = function(name, btn) {
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name)?.classList.add('active');
  if(btn) btn.classList.add('active');
}

function ini(c){return((c.fname||'')[0]||'')+((c.lname||'')[0]||'');}
function gv(id){return document.getElementById(id)?.value||'';}
function fmtDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}}
function setDefaultDates(){const t=new Date().toISOString().split('T')[0];['log-lift-date','log-nutr-date','log-habit-date','ci-date'].forEach(id=>{const el=document.getElementById(id);if(el&&!el.value)el.value=t;});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
